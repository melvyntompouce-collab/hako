<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HAKO</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@900&family=Syne:wght@700;800&family=DM+Mono&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #04040a; color: #f0f0f8;
      font-family: 'Syne', sans-serif;
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      overflow: hidden;
    }
    body::before {
      content: ''; position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 0;
    }
    .glow {
      position: fixed; width: 500px; height: 500px; border-radius: 50%;
      background: radial-gradient(circle, rgba(0,245,155,0.06) 0%, transparent 70%);
      top: 50%; left: 50%; transform: translate(-50%,-50%);
      pointer-events: none;
      animation: glow-pulse 4s ease-in-out infinite;
    }
    @keyframes glow-pulse {
      0%,100% { transform: translate(-50%,-50%) scale(1); opacity: 0.6; }
      50%      { transform: translate(-50%,-50%) scale(1.2); opacity: 1; }
    }
    .wrap {
      position: relative; z-index: 1;
      display: flex; flex-direction: column;
      align-items: center; padding: 40px 24px;
      gap: 48px; text-align: center;
    }
    .logo {
      font-weight: 800; font-size: 12px;
      letter-spacing: 7px; color: #00f59b;
      opacity: 0; animation: up 0.7s ease 0.1s forwards;
    }
    .bracelet-scene {
      position: relative; width: 180px; height: 180px;
      opacity: 0; animation: up 0.7s ease 0.3s forwards;
    }
    .ring {
      position: absolute; inset: 0; border-radius: 50%;
      border: 1px solid rgba(0,245,155,0.08);
      animation: spin 18s linear infinite;
    }
    .ring:nth-child(2) {
      inset: 18px; border-color: rgba(155,93,229,0.07);
      animation: spin 12s linear infinite reverse;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .band {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%,-50%);
      width: 100px; height: 36px;
      background: linear-gradient(135deg, #111120, #0a0a18);
      border-radius: 18px;
      border: 1px solid rgba(0,245,155,0.18);
      box-shadow: 0 0 28px rgba(0,245,155,0.08), inset 0 1px 0 rgba(255,255,255,0.04);
      display: flex; align-items: center; justify-content: center; gap: 9px;
    }
    .led { width: 7px; height: 7px; border-radius: 50%; }
    .led-g { background:#00f59b; box-shadow:0 0 8px #00f59b,0 0 16px #00f59b; animation:blink 2s ease-in-out infinite; }
    .led-p { background:#9b5de5; box-shadow:0 0 8px #9b5de5; animation:blink 2s ease-in-out 0.7s infinite; opacity:.6; }
    .led-g2{ background:#00f59b; box-shadow:0 0 8px #00f59b; animation:blink 2s ease-in-out 1.4s infinite; opacity:.3; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.12} }
    .title {
      font-family: 'Big Shoulders Display', sans-serif; font-weight: 900;
      font-size: clamp(48px,13vw,76px); line-height: 0.88; letter-spacing: -1px;
      opacity: 0; animation: up 0.7s ease 0.5s forwards;
    }
    .title span:nth-child(1) { display:block; color:#00f59b; font-size:1.3em; text-shadow: 0 0 40px rgba(0,245,155,0.4); -webkit-text-stroke: 0; }
    .title span:nth-child(2) { display:block; color:transparent; -webkit-text-stroke:1.5px rgba(240,240,248,0.18); }
    .title span:nth-child(3) { display:block; color:#f0f0f8; }
    .form { width:100%; max-width:360px; opacity:0; animation:up 0.7s ease 0.7s forwards; }
    .form-row { display:flex; gap:8px; }
    input[type=email] {
      flex:1; padding:13px 16px;
      background:rgba(255,255,255,0.04);
      border:1px solid rgba(0,245,155,0.15);
      border-radius:12px; color:#f0f0f8;
      font-family:'DM Mono',monospace; font-size:13px;
      outline:none; transition:border-color 0.2s; min-width:0;
    }
    input[type=email]::placeholder { color:rgba(240,240,248,0.2); }
    input[type=email]:focus { border-color:rgba(0,245,155,0.4); }
    button {
      padding:13px 18px; background:#00f59b; color:#04040a;
      border:none; border-radius:12px;
      font-family:'Syne',sans-serif; font-weight:800; font-size:13px;
      cursor:pointer; white-space:nowrap; transition:background 0.2s,transform 0.15s;
    }
    button:hover { background:#00d485; transform:translateY(-1px); }
    .ok {
      display:none; padding:13px;
      background:rgba(0,245,155,0.07);
      border:1px solid rgba(0,245,155,0.2);
      border-radius:12px; font-family:'DM Mono',monospace;
      font-size:13px; color:#00f59b;
    }
    .count { margin-top:14px; font-family:'DM Mono',monospace; font-size:11px; color:rgba(240,240,248,0.25); }
    .count b { color:#00f59b; font-weight:500; }
    .back {
      position:fixed; bottom:24px; left:50%; transform:translateX(-50%);
      font-size:11px; color:rgba(240,240,248,0.18);
      letter-spacing:2px; text-transform:uppercase;
      text-decoration:none; z-index:1; transition:color 0.2s;
    }
    .back:hover { color:rgba(0,245,155,0.5); }
    @keyframes up { from{opacity:0;transform:translateY(18px)} to{opacity:1;transform:translateY(0)} }
    @media(max-width:420px) { .form-row { flex-direction:column; } }
  </style>
</head>
<body>
<div class="glow"></div>
<div class="wrap">
  <div class="logo">HAKO</div>
  <div class="bracelet-scene">
    <div class="ring"></div>
    <div class="ring"></div>
    <div class="band">
      <div class="led led-g"></div>
      <div class="led led-p"></div>
      <div class="led led-g2"></div>
    </div>
  </div>
  <h1 class="title">
    <span>箱</span>
    <span>EVERYTHING</span>
    <span>YOU NEED.</span>
  </h1>
  <div class="form">
    <div class="form-row" id="form-row">
      <input type="email" id="email" placeholder="ton@email.com" autocomplete="email">
      <button onclick="submit()">Notifie-moi</button>
    </div>
    <div class="ok" id="ok">✓ Tu seras parmi les premiers informés</div>
    <div class="count" id="count"></div>
  </div>
</div>
<a class="back" href="/">← HAKO</a>
<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js';
  import { getFirestore, collection, addDoc, getDocs } from 'https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js';
  const db = getFirestore(initializeApp({
    apiKey:"AIzaSyCUVW01qGM7JkULmezdeY6zvqRtsMOaEB8",
    authDomain:"danceband2.firebaseapp.com",
    projectId:"danceband2",
    storageBucket:"danceband2.firebasestorage.app",
    messagingSenderId:"397526470867",
    appId:"1:397526470867:web:c38137a8eb3def73644426"
  }));
  async function loadCount() {
    try {
      const n = (await getDocs(collection(db,'waitlist'))).size;
      if (n>0) document.getElementById('count').innerHTML=`<b>${n}</b> personne${n>1?'s':''} en liste d'attente`;
    } catch(e) {}
  }
  loadCount();
  window.submit = async () => {
    const input = document.getElementById('email');
    const email = input.value.trim();
    if (!email||!email.includes('@')) {
      input.style.borderColor='rgba(255,77,109,0.5)';
      setTimeout(()=>input.style.borderColor='',1500); return;
    }
    try {
      await addDoc(collection(db,'waitlist'),{email,date:new Date().toISOString()});
      document.getElementById('form-row').style.display='none';
      document.getElementById('ok').style.display='block';
      loadCount();
    } catch(e) { alert('Erreur, réessaye'); }
  };
  document.getElementById('email').addEventListener('keydown',e=>{if(e.key==='Enter')window.submit();});
</script>
</body>
</html>
